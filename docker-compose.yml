services:
  db:
    image: postgres:15
    container_name: library_db
    restart: always
    env_file:
      - .env
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - library_postgres_data:/var/lib/postgresql/data
      - ./data/datasets:/datasets
      - ./db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: library_backend
    restart: always
    ports:
      - "8000:8080"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_NAME: library
      DATABASE_USER: ${POSTGRES_USER}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      APPLICATION_SECURITY_JWT_SECRET_KEY: ${JWT_SECRET}
      REDIS_HOST: redis
      CORS_ALLOWED_ORIGIN_PATTERNS: "http://localhost:5173"

  frontend:
    build: ./frontend
    container_name: library_frontend
    restart: always
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
  redis:
    image: redis:7-alpine
    container_name: library_redis
    ports:
      - "6379:6379"
    restart: always
  pgadmin:
    image: dpage/pgadmin4
    container_name: library_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@lbms.com # Login email for pgAdmin UI
      PGADMIN_DEFAULT_PASSWORD: admin # Login password for pgAdmin UI
    ports:
      - "5050:80" # Maps localhost:5050 to container port 80
    depends_on:
      - db

  loki:
    image: grafana/loki:latest
    container_name: lbms-loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    restart: always

  grafana:
    image: grafana/grafana:latest
    container_name: lbms-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin # Login username for Grafana
      - GF_SECURITY_ADMIN_PASSWORD=admin # Login password for Grafana
    depends_on:
      - loki
    restart: always

volumes:
  library_postgres_data:
